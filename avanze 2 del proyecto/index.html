<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Simulador IA PRO</title>

    <style>
         :root {
            --bg: #141e30;
            --card: #ffffff;
            --text: #333;
            --primary: #4facfe;
        }
        
        body.dark {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #e2e8f0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--bg), #243b55);
            color: var(--text);
            transition: .3s;
        }
        /* CONTENEDOR */
        
        .main {
            width: 850px;
            height: 520px;
            background: var(--card);
            border-radius: 15px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, .3);
        }
        /* PANEL IZQUIERDO */
        
        .left {
            width: 50%;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }
        
        .left h1 {
            margin-bottom: 10px;
        }
        /* PANEL DERECHO */
        
        .right {
            width: 50%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        input,
        textarea {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        
        button {
            margin-top: 12px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        
        button:hover {
            opacity: .9;
        }
        /* APP */
        
        .app {
            display: none;
            flex-direction: column;
        }
        
        .box {
            margin-top: 10px;
            background: #f1f5f9;
            padding: 10px;
            border-radius: 8px;
        }
        
        body.dark .box {
            background: #334155;
        }
        
        .error {
            color: red;
            display: none;
            margin-top: 10px;
        }
        /* SWITCH */
        
        .switch {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            background: #fff;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
    </style>

</head>

<body>

    <div class="switch" onclick="toggleDark()">🌙 Modo</div>

    <div class="main">

        <div class="left">
            <h1>Simulador IA</h1>
            <p>Entrena entrevistas como un profesional</p>
        </div>

        <div class="right" id="login">

            <h2>Iniciar Sesión</h2>

            <input id="user" placeholder="Usuario">
            <input id="pass" type="password" placeholder="Contraseña">

            <button onclick="login()">Entrar</button>
            <button onclick="registrar()">Registrar usuario</button>

            <p class="error" id="error">Datos incorrectos</p>

        </div>

        <div class="right app" id="app">

            <h2>Bienvenido</h2>

            <input id="puesto" placeholder="¿A qué puesto aplicas?">

            <button onclick="generar()">Generar pregunta</button>

            <div class="box" id="pregunta"></div>

            <textarea id="respuesta" rows="3" placeholder="Tu respuesta..."></textarea>

            <button onclick="evaluar()">Evaluar</button>

            <div class="box" id="feedback"></div>

        </div>

    </div>

    <script>
        let preguntaActual = ""

        // ===== MODO OSCURO =====
        function toggleDark() {
            document.body.classList.toggle("dark")
        }

        // ===== GUARDAR USUARIOS =====
        function registrar() {

            let user = document.getElementById("user").value.toLowerCase()
            let pass = document.getElementById("pass").value

            if (!user || !pass) return alert("Llena los campos")

            let usuarios = JSON.parse(localStorage.getItem("usuarios")) || {}

            usuarios[user] = pass

            localStorage.setItem("usuarios", JSON.stringify(usuarios))

            alert("Usuario guardado")
        }

        // ===== LOGIN =====
        function login() {

            let user = document.getElementById("user").value.toLowerCase()
            let pass = document.getElementById("pass").value

            let usuarios = JSON.parse(localStorage.getItem("usuarios")) || {}

            // usuarios por defecto
            usuarios["alan"] = "alanyever2.0"
            usuarios["ever"] = "alanyever2.0"

            if (usuarios[user] === pass) {

                document.getElementById("login").style.display = "none"
                document.getElementById("app").style.display = "flex"

            } else {

                document.getElementById("error").style.display = "block"

            }

        }

        // ===== EFECTO ESCRITURA IA =====
        function escribir(texto, elemento) {

            elemento.innerHTML = ""
            let i = 0

            let intervalo = setInterval(() => {

                elemento.innerHTML += texto[i]
                i++

                if (i >= texto.length) clearInterval(intervalo)

            }, 30)

        }

        // ===== GENERAR PREGUNTA =====
        function generar() {

            let puesto = document.getElementById("puesto").value

            if (!puesto) return alert("Escribe un puesto")

            preguntaActual = `¿Por qué quieres trabajar como ${puesto}?`

            escribir(preguntaActual, document.getElementById("pregunta"))

        }

        // ===== EVALUAR =====
        function evaluar() {

            let r = document.getElementById("respuesta").value

            if (!r) return alert("Escribe tu respuesta")

            let feedback = ""

            if (r.length < 30) {
                feedback = "Tu respuesta es muy corta."
            } else if (r.length < 80) {
                feedback = "Buena respuesta, pero puedes mejorarla."
            } else {
                feedback = "Excelente respuesta, muy completa."
            }

            escribir(feedback, document.getElementById("feedback"))

        }
    </script>

</body>

</html>S
